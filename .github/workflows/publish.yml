# Publishes to PyPI when a GitHub release is published.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token or password is stored
# anywhere. One-time setup on https://pypi.org: add a "trusted publisher"
# for this repository with workflow file name `publish.yml` and
# environment `pypi`.
name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run tests
        run: |
          pip install .
          python -m unittest discover tests -v
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyhomerun
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
